<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tax Calculator - Professional Tax Management</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        },
                        gray: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#111827',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .shadow-soft {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .transaction-card {
            transition: all 0.3s ease;
        }
        .transaction-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createElement } = React;

        const CryptoTaxCalculator = () => {
            const [transactions, setTransactions] = useState([]);
            const [formData, setFormData] = useState({
                date: '',
                type: 'buy',
                crypto: 'BTC',
                amount: '',
                usdValue: ''
            });
            const [errors, setErrors] = useState({});
            const [taxSummary, setTaxSummary] = useState({
                totalGains: 0,
                totalLosses: 0,
                netGains: 0,
                taxOwed: 0
            });

            const cryptoOptions = [
                { value: 'BTC', label: 'Bitcoin (BTC)', icon: '₿' },
                { value: 'ETH', label: 'Ethereum (ETH)', icon: 'Ξ' },
                { value: 'ADA', label: 'Cardano (ADA)', icon: '₳' },
                { value: 'DOT', label: 'Polkadot (DOT)', icon: '●' },
                { value: 'LINK', label: 'Chainlink (LINK)', icon: '⬢' },
                { value: 'OTHER', label: 'Other', icon: '◊' }
            ];

            const validateForm = () => {
                const newErrors = {};
                
                if (!formData.date) {
                    newErrors.date = 'Date is required';
                }
                
                if (!formData.amount || parseFloat(formData.amount) <= 0) {
                    newErrors.amount = 'Valid amount is required';
                }
                
                if (!formData.usdValue || parseFloat(formData.usdValue) <= 0) {
                    newErrors.usdValue = 'Valid USD value is required';
                }
                
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const calculateTaxes = (transactionList) => {
                const fifoQueue = {};
                let totalGains = 0;
                let totalLosses = 0;
                
                // Short-term capital gains tax rate (simplified)
                const taxRate = 0.22;

                transactionList.forEach(transaction => {
                    const { type, crypto, amount, usdValue } = transaction;
                    const numAmount = parseFloat(amount);
                    const numUsdValue = parseFloat(usdValue);
                    const pricePerCoin = numUsdValue / numAmount;

                    if (type === 'buy') {
                        if (!fifoQueue[crypto]) {
                            fifoQueue[crypto] = [];
                        }
                        fifoQueue[crypto].push({
                            amount: numAmount,
                            pricePerCoin: pricePerCoin,
                            date: transaction.date
                        });
                    } else if (type === 'sell') {
                        if (fifoQueue[crypto] && fifoQueue[crypto].length > 0) {
                            let remainingToSell = numAmount;
                            
                            while (remainingToSell > 0 && fifoQueue[crypto].length > 0) {
                                const oldestBuy = fifoQueue[crypto][0];
                                const sellAmount = Math.min(remainingToSell, oldestBuy.amount);
                                
                                const gainLoss = (pricePerCoin - oldestBuy.pricePerCoin) * sellAmount;
                                
                                if (gainLoss > 0) {
                                    totalGains += gainLoss;
                                } else {
                                    totalLosses += Math.abs(gainLoss);
                                }
                                
                                oldestBuy.amount -= sellAmount;
                                remainingToSell -= sellAmount;
                                
                                if (oldestBuy.amount <= 0) {
                                    fifoQueue[crypto].shift();
                                }
                            }
                        }
                    }
                });

                const netGains = totalGains - totalLosses;
                const taxOwed = Math.max(0, netGains * taxRate);

                return {
                    totalGains,
                    totalLosses,
                    netGains,
                    taxOwed
                };
            };

            useEffect(() => {
                const summary = calculateTaxes(transactions);
                setTaxSummary(summary);
            }, [transactions]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prevData => ({
                    ...prevData,
                    [name]: value
                }));
                
                if (errors[name]) {
                    setErrors(prevErrors => ({
                        ...prevErrors,
                        [name]: ''
                    }));
                }
            };

            const handleAddTransaction = () => {
                if (validateForm()) {
                    const newTransaction = {
                        id: Date.now(),
                        ...formData,
                        amount: parseFloat(formData.amount),
                        usdValue: parseFloat(formData.usdValue)
                    };
                    
                    setTransactions(prevTransactions => [...prevTransactions, newTransaction]);
                    setFormData({
                        date: '',
                        type: 'buy',
                        crypto: 'BTC',
                        amount: '',
                        usdValue: ''
                    });
                }
            };

            const handleDeleteTransaction = (id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
            };

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(amount);
            };

            const formatDate = (dateString) => {
                return new Date(dateString).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            };

            const getCryptoIcon = (crypto) => {
                const option = cryptoOptions.find(opt => opt.value === crypto);
                return option ? option.icon : '◊';
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">
                    {/* Header */}
                    <header className="gradient-bg shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            <div className="text-center">
                                <h1 className="text-4xl font-bold text-white mb-2">
                                    Crypto Tax Calculator
                                </h1>
                                <p className="text-blue-100 text-lg">
                                    Professional cryptocurrency tax calculation and reporting
                                </p>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Transaction Input Form */}
                            <div className="lg:col-span-1">
                                <div className="bg-white rounded-xl shadow-soft p-6">
                                    <h2 className="text-2xl font-semibold text-gray-800 mb-6">
                                        Add Transaction
                                    </h2>
                                    
                                    <div className="space-y-4">
                                        {/* Date Input */}
                                        <div>
                                            <label htmlFor="date" className="block text-sm font-medium text-gray-700 mb-2">
                                                Transaction Date
                                            </label>
                                            <input
                                                type="date"
                                                id="date"
                                                name="date"
                                                value={formData.date}
                                                onChange={handleInputChange}
                                                className={`w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all ${
                                                    errors.date ? 'border-red-500' : 'border-gray-300'
                                                }`}
                                                aria-describedby={errors.date ? 'date-error' : undefined}
                                            />
                                            {errors.date && (
                                                <p id="date-error" className="text-red-500 text-sm mt-1" role="alert">
                                                    {errors.date}
                                                </p>
                                            )}
                                        </div>

                                        {/* Transaction Type */}
                                        <div>
                                            <label htmlFor="type" className="block text-sm font-medium text-gray-700 mb-2">
                                                Transaction Type
                                            </label>
                                            <select
                                                id="type"
                                                name="type"
                                                value={formData.type}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                                            >
                                                <option value="buy">Buy</option>
                                                <option value="sell">Sell</option>
                                            </select>
                                        </div>

                                        {/* Cryptocurrency Type */}
                                        <div>
                                            <label htmlFor="crypto" className="block text-sm font-medium text-gray-700 mb-2">
                                                Cryptocurrency
                                            </label>
                                            <select
                                                id="crypto"
                                                name="crypto"
                                                value={formData.crypto}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                                            >
                                                {cryptoOptions.map(option => (
                                                    <option key={option.value} value={option.value}>
                                                        {option.icon} {option.label}
                                                    </option>
                                                ))}
                                            </select>
                                        </div>

                                        {/* Amount */}
                                        <div>
                                            <label htmlFor="amount" className="block text-sm font-medium text-gray-700 mb-2">
                                                Amount
                                            </label>
                                            <input
                                                type="number"
                                                id="amount"
                                                name="amount"
                                                step="0.00000001"
                                                placeholder="0.00000000"
                                                value={formData.amount}
                                                onChange={handleInputChange}
                                                className={`w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all ${
                                                    errors.amount ? 'border-red-500' : 'border-gray-300'
                                                }`}
                                                aria-describedby={errors.amount ? 'amount-error' : undefined}
                                            />
                                            {errors.amount && (
                                                <p id="amount-error" className="text-red-500 text-sm mt-1" role="alert">
                                                    {errors.amount}
                                                </p>
                                            )}
                                        </div>

                                        {/* USD Value */}
                                        <div>
                                            <label htmlFor="usdValue" className="block text-sm font-medium text-gray-700 mb-2">
                                                Total USD Value
                                            </label>
                                            <input
                                                type="number"
                                                id="usdValue"
                                                name="usdValue"
                                                step="0.01"
                                                placeholder="0.00"
                                                value={formData.usdValue}
                                                onChange={handleInputChange}
                                                className={`w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all ${
                                                    errors.usdValue ? 'border-red-500' : 'border-gray-300'
                                                }`}
                                                aria-describedby={errors.usdValue ? 'usd-error' : undefined}
                                            />
                                            {errors.usdValue && (
                                                <p id="usd-error" className="text-red-500 text-sm mt-1" role="alert">
                                                    {errors.usdValue}
                                                </p>
                                            )}
                                        </div>

                                        <button
                                            onClick={handleAddTransaction}
                                            className="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200 focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
                                            aria-label="Add transaction to the list"
                                        >
                                            Add Transaction
                                        </button>
                                    </div>
                                </div>

                                {/* Tax Summary */}
                                <div className="bg-white rounded-xl shadow-soft p-6 mt-8">
                                    <h2 className="text-2xl font-semibold text-gray-800 mb-6">
                                        Tax Summary
                                    </h2>
                                    
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center py-2 border-b border-gray-100">
                                            <span className="text-gray-600">Total Gains:</span>
                                            <span className="font-semibold text-green-600">
                                                {formatCurrency(taxSummary.totalGains)}
                                            </span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-gray-100">
                                            <span className="text-gray-600">Total Losses:</span>
                                            <span className="font-semibold text-red-600">
                                                {formatCurrency(taxSummary.totalLosses)}
                                            </span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-gray-200">
                                            <span className="text-gray-800 font-medium">Net Gains/Losses:</span>
                                            <span className={`font-bold ${taxSummary.netGains >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                {formatCurrency(taxSummary.netGains)}
                                            </span>
                                        </div>
                                        <div className="flex justify-between items-center py-3 bg-primary-50 rounded-lg px-4">
                                            <span className="text-primary-800 font-semibold">Estimated Tax Owed:</span>
                                            <span className="font-bold text-xl text-primary-700">
                                                {formatCurrency(taxSummary.taxOwed)}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                                        <p className="text-sm text-yellow-800">
                                            <strong>Disclaimer:</strong> This is a simplified calculation using a 22% short-term capital gains rate. 
                                            Consult a tax professional for accurate tax advice.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Transactions List */}
                            <div className="lg:col-span-2">
                                <div className="bg-white rounded-xl shadow-soft p-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-semibold text-gray-800">
                                            Transaction History
                                        </h2>
                                        <span className="text-sm text-gray-500">
                                            {transactions.length} transaction{transactions.length !== 1 ? 's' : ''}
                                        </span>
                                    </div>

                                    {transactions.length === 0 ? (
                                        <div className="text-center py-12">
                                            <div className="text-6xl text-gray-300 mb-4">📊</div>
                                            <h3 className="text-lg font-medium text-gray-500 mb-2">
                                                No transactions yet
                                            </h3>
                                            <p className="text-gray-400">
                                                Add your first cryptocurrency transaction to get started
                                            </p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {transactions.map((transaction) => (
                                                <div
                                                    key={transaction.id}
                                                    className="transaction-card border border-gray-200 rounded-lg p-4 bg-white"
                                                >
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex items-center space-x-4">
                                                            <div className="text-2xl">
                                                                {getCryptoIcon(transaction.crypto)}
                                                            </div>
                                                            <div>
                                                                <div className="flex items-center space-x-2">
                                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                                                        transaction.type === 'buy' 
                                                                            ? 'bg-green-100 text-green-800' 
                                                                            : 'bg-red-100 text-red-800'
                                                                    }`}>
                                                                        {transaction.type.toUpperCase()}
                                                                    </span>
                                                                    <span className="text-lg font-semibold text-gray-800">
                                                                        {transaction.crypto}
                                                                    </span>
                                                                </div>
                                                                <div className="text-sm text-gray-600 mt-1">
                                                                    {formatDate(transaction.date)}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="text-right">
                                                            <div className="text-lg font-semibold text-gray-800">
                                                                {transaction.amount.toFixed(8)} {transaction.crypto}
                                                            </div>
                                                            <div className="text-sm text-gray-600">
                                                                {formatCurrency(transaction.usdValue)}
                                                            </div>
                                                            <div className="text-xs text-gray-500 mt-1">
                                                                @ {formatCurrency(transaction.usdValue / transaction.amount)}/coin
                                                            </div>
                                                        </div>
                                                        
                                                        <button
                                                            onClick={() => handleDeleteTransaction(transaction.id)}
                                                            className="ml-4 text-gray-400 hover:text-red-500 transition-colors duration-200"
                                                            aria-label={`Delete ${transaction.type} transaction of ${transaction.amount} ${transaction.crypto}`}
                                                        >
                                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path>
                                                            </svg>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-8 mt-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                            <p className="text-gray-300">
                                © 2025 Crypto Tax Calculator. For educational purposes only. 
                                Consult a qualified tax professional for official tax advice.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(CryptoTaxCalculator));
    </script>
</body>
</html>
