<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image to PDF Converter</title>
</head>
<body>
  <h1>Image to PDF Converter</h1>
  <form id="uploadForm">
    <input type="file" name="images" id="images" multiple accept="image/*">
    <button type="submit">Convert to PDF</button>
  </form>
  <div id="message"></div>
  <script>
    const form = document.getElementById('uploadForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const files = document.getElementById('images').files;
      if (files.length === 0) {
        message.textContent = 'Please select image files.';
        return;
      }
      const formData = new FormData();
      for (let i = 0; i < files.length; i++) {
        formData.append('images', files[i]);
      }

      message.textContent = 'Converting...';

      try {
        const response = await fetch('https://offerloom-jisf-m8r1l1m84-nkgshahbaz58-cells-projects.vercel.app/convert', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error('Conversion failed.');
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        // Download the PDF
        const a = document.createElement('a');
        a.href = url;
        a.download = 'converted.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        message.textContent = 'PDF downloaded!';
      } catch (error) {
        message.textContent = 'Error: ' + error.message;
      }
    });
  </script>
</body>
</html>
